name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Step 1: Run tests before releasing ────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Run test suite
        shell: nu {0}
        run: |
          cd tests
          nu run.nu

  # ── Step 2: Auto-version and create Release PR ─────────────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: test
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Step 3: Build and attach release artifacts ────────────────────────────
  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Verify tests pass on release commit
        shell: nu {0}
        run: |
          cd tests
          nu run.nu

      - name: Build release archive
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          mkdir -p dist/platform-cli-${VERSION}
          cp main.nu setup.nu config.nu version.txt dist/platform-cli-${VERSION}/
          cp -r modules templates dist/platform-cli-${VERSION}/
          cp README.md dist/platform-cli-${VERSION}/ 2>/dev/null || true
          cd dist
          tar -czf platform-cli-${VERSION}.tar.gz platform-cli-${VERSION}/
          sha256sum platform-cli-${VERSION}.tar.gz > platform-cli-${VERSION}.tar.gz.sha256

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/platform-cli-*.tar.gz
            dist/platform-cli-*.tar.gz.sha256
