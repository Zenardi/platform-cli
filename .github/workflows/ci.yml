name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Run test suite
        shell: nu {0}
        run: |
          cd tests
          nu run.nu

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: tests/
          retention-days: 7

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Auto-tag from conventional commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: "v"

      - name: Install Nushell
        if: steps.tag.outputs.new_tag != ''
        uses: hustcer/setup-nu@v3
        with:
          version: "0.111.0"

      - name: Build release archive
        if: steps.tag.outputs.new_tag != ''
        env:
          VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          mkdir -p dist/platform-cli-${VERSION}
          cp main.nu setup.nu config.nu version.txt dist/platform-cli-${VERSION}/
          cp -r modules templates dist/platform-cli-${VERSION}/
          cp README.md dist/platform-cli-${VERSION}/ 2>/dev/null || true
          cd dist
          tar -czf platform-cli-${VERSION}.tar.gz platform-cli-${VERSION}/
          sha256sum platform-cli-${VERSION}.tar.gz > platform-cli-${VERSION}.tar.gz.sha256

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: |
            dist/platform-cli-*.tar.gz
            dist/platform-cli-*.tar.gz.sha256
